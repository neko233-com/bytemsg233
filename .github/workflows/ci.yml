name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24', '1.25', '1.26']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test ./... -race -count=1 -v

      - name: Coverage
        if: matrix.go-version == '1.26'
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Vet
        run: go vet ./...

  size-comparison:
    name: Size Comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run size benchmarks
        run: go test ./pkg/binary/... -run "TestSizeComparison" -v

  build:
    name: Build
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Reset existing release artifacts for rerun safety
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release delete "${GITHUB_REF_NAME}" --yes
          else
            echo "No existing release found for ${GITHUB_REF_NAME}, skipping cleanup."
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-snapshot:
    name: Release Snapshot
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build snapshot
        run: |
          go build -ldflags="-s -w" -trimpath -o bytemsg233 ./cmd/bytemsg233
          ./bytemsg233 version
          ./bytemsg233 init test-schema
          ./bytemsg233 compile test-schema.bmsg.json --lang go --lang csharp --lang typescript --lang rust --lang java -o ./generated
          ./bytemsg233 export test-schema.bmsg.json --format md,html,bmsg -o ./protocol-docs
          test -f ./protocol-docs/test-schema.md
          test -f ./protocol-docs/test-schema.html
          test -f ./protocol-docs/test-schema.bmsg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bytemsg233-linux-amd64
          path: bytemsg233
